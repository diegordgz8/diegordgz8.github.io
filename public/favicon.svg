<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <clipPath id="iris">
      <circle cx="64" cy="64" r="60"/>
    </clipPath>
    <radialGradient id="irisGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#5C3A1E"/>
      <stop offset="100%" stop-color="#3B2210"/>
    </radialGradient>
  </defs>
  <!-- Limbal ring -->
  <circle cx="64" cy="64" r="63" fill="#2A1A0A"/>
  <!-- Iris base -->
  <circle cx="64" cy="64" r="60" fill="url(#irisGrad)"/>
  <!-- Heterochromia - triangle slice from bottom to pupil, clipped by iris -->
  <polygon points="30,127 98,127 64,64" fill="#7A5230" clip-path="url(#iris)"/>
  <!-- Pupil (covers triangle tip) -->
  <circle cx="64" cy="64" r="22" fill="#060b12"/>
  <!-- Light reflection -->
  <circle cx="50" cy="48" r="8" fill="white" opacity="0.7"/>
  <circle cx="76" cy="78" r="4" fill="white" opacity="0.3"/>
</svg>
